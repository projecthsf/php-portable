name: Publish to JetBrains Marketplace

# Push to main/master → publish the plugin, but only when the version in build.gradle.kts
# is new (guarded by a git tag). Code-only pushes that don't bump the version are skipped,
# so we never try to re-upload an existing version (Marketplace rejects duplicates).
# To cut a release: bump `version = "x.y.z"` in build.gradle.kts (+ update <change-notes>),
# commit, and push to main.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the version tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # need tags to know what's already been published

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'   # Kotlin 1.9 compiler is unstable on newer JDKs; pin 17
          cache: gradle

      - name: Read plugin version
        id: ver
        run: |
          VERSION=$(grep -E '^version = ' build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then echo "Could not parse version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Skip if this version was already published
        id: guard
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.ver.outputs.version }} already exists — nothing new to publish."
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish plugin
        if: steps.guard.outputs.new == 'true'
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin --no-daemon --stacktrace

      - name: Tag the published version
        if: steps.guard.outputs.new == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
